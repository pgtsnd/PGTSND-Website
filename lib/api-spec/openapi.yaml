      operationId: listDeliverableReviews
      tags: [reviews]
      summary: List reviews for a deliverable
      parameters:
        - name: deliverableId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      parameters:
