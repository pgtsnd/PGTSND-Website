      summary: Get DM thread with another user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thread messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: sendDm
      tags: [messages]
      summary: Send a DM
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDm"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dm/threads/{userId}/read:
    patch:
      operationId: markDmThreadRead
      tags: [messages]
      summary: Mark all messages in a DM thread as read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /messages/unread-summary:
    get:
      operationId: getUnreadSummary
      tags: [messages]
      summary: Unread counts split by project groups vs DMs
      responses:
        "200":
          description: Unread summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadSummary"

  /projects/{projectId}/contracts:
    get:
      operationId: listProjectContracts
      tags: [contracts]
      summary: List contracts for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
    post:
      operationId: createContract
      tags: [contracts]
      summary: Create a contract
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContract"
      responses:
        "201":
          description: Contract created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          $ref: "#/components/responses/ValidationError"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get a contract by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Contract details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateContract
      tags: [contracts]
      summary: Update a contract
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContract"
      responses:
        "200":
          description: Contract updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContract
      tags: [contracts]
      summary: Delete a contract
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/DeleteSuccess"
        "404":
          $ref: "#/components/responses/NotFound"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices (owner / partner only)
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /invoices/{id}:
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice (status, due date, etc.)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoice"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /invoices/{id}/send:
    post:
      operationId: sendInvoice
      tags: [invoices]
      summary: Mark invoice as sent (and send via Stripe if configured)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Invoice sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          $ref: "#/components/responses/NotFound"

  /invoices/{id}/checkout:
    post:
      operationId: createInvoiceCheckoutSession
      tags: [invoices]
      summary: Create a Stripe Checkout session for an invoice
      description: |
        Creates (or reuses) a Stripe Checkout session for the given invoice and
        returns the hosted checkout URL. The successUrl and cancelUrl must share
        the same origin as the request.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Invoice not found, already paid, or Stripe not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to create checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invoices/{id}/payment:
    get:
      operationId: getInvoicePaymentDetails
      tags: [invoices]
      summary: Get Stripe payment details for a paid invoice
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentDetails"
        "404":
          $ref: "#/components/responses/NotFound"

  /access-tokens:
    get:
      operationId: listAccessTokens
      tags: [users]
      summary: List access tokens
      description: Owner/partner only. Returns every access token across the studio.
      responses:
        "200":
          description: List of access tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createAccessToken
      tags: [users]
      summary: Generate an access token
      description: |
        Owner/partner only. Creates an access token for either an existing user
        (pass userId) or a new user (pass newUser). The plaintext token is returned
        ONCE in the response and cannot be retrieved again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccessToken"
      responses:
        "201":
          description: Access token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenIssueResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /access-tokens/{id}/revoke:
    post:
      operationId: revokeAccessToken
      tags: [users]
      summary: Revoke an access token
      description: Owner/partner only. Marks the token revoked immediately.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Access token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

