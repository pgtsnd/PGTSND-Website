kind = "web"
previewPath = "/"
title = "PGTSND Productions"
version = "1.0.0"
id = "artifacts/pgtsnd-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22475

[services.development]
run = "pnpm --filter @workspace/pgtsnd-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pgtsnd-website", "run", "build" ]
publicDir = "artifacts/pgtsnd-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22475"
BASE_PATH = "/"
