    patch:
      operationId: updateContract
      tags: [contracts]
      summary: Update a contract
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContract"
      responses:
        "200":
          description: Contract updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContract
      tags: [contracts]
      summary: Delete a contract
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/DeleteSuccess"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
    DeleteSuccess:
      description: Resource deleted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeleteResult"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ValidationError:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - error

    DeleteResult:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, partner, crew, client]
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        initials:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - createdAt
        - updatedAt

    CreateUser:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, partner, crew, client]
        avatarUrl:
          type: string
        phone:
          type: string
        title:
          type: string
        initials:
          type: string
      required:
        - email
        - name

    UpdateUser:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
        phone:
          type: string
        title:
          type: string
        initials:
          type: string

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contactName:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        notes:
          type: string
