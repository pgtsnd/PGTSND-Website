              schema:
                $ref: "#/components/schemas/Deliverable"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateDeliverable
      tags: [deliverables]
      summary: Update a deliverable
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeliverable"
      responses:
        "200":
          description: Deliverable updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deliverable"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDeliverable
      tags: [deliverables]
      summary: Delete a deliverable
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
